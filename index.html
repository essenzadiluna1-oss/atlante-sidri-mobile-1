<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#06111f">
<title>XA Cider Atlas Pro V7</title>

<style>
:root{
  --bg:#06111f;--p1:#101b2b;--p2:#17283c;--p3:#25384c;
  --cream:#f6ecd2;--muted:#aebdcc;--cyan:#52d9ff;--green:#42f28a;
  --red:#ff3b55;--amber:#ffc44f;--violet:#b58cff;--orange:#ff8d3d;
  --line:rgba(246,236,210,.18);--shadow:0 18px 44px rgba(0,0,0,.55);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;padding:10px 10px 106px;color:var(--cream);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 15% 0%,rgba(82,217,255,.17),transparent 30%),
    radial-gradient(circle at 85% 0%,rgba(255,59,85,.14),transparent 32%),
    linear-gradient(180deg,#06111f,#0b1624 45%,#05080d);
}
.app{max-width:980px;margin:auto}
.topbar{
  position:sticky;top:0;z-index:50;margin:-10px -10px 10px;padding:10px;
  background:linear-gradient(180deg,rgba(6,17,31,.98),rgba(6,17,31,.90),rgba(6,17,31,0));
  backdrop-filter:blur(14px);
}
.master,.card,.panel,.rack,.fruitCard,.lessonCard,.bizCard,.areaCard{
  border:1px solid rgba(82,217,255,.22);
  border-radius:24px;
  background:linear-gradient(180deg,rgba(40,54,66,.96),rgba(13,22,31,.98));
  box-shadow:var(--shadow);
  overflow:hidden;
}
.master{
  padding:12px;
  background:linear-gradient(180deg,#263849,#101b2b);
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.10);
}
.brand{display:flex;justify-content:space-between;align-items:center;gap:10px}
.logo{
  width:58px;height:58px;border-radius:17px;display:grid;place-items:center;
  color:#07101a;font-size:25px;font-weight:1000;letter-spacing:-2px;
  background:linear-gradient(180deg,#fff2ce,#c99d3f);border:2px solid #ffe8a5;
  box-shadow:0 0 22px rgba(255,196,79,.38),inset 0 0 10px rgba(255,255,255,.45);
}
h1{margin:0;font-size:21px;line-height:1}
.sub{margin-top:5px;color:var(--muted);font-size:12px;line-height:1.25}
.livebox{
  min-width:82px;border:1px solid rgba(82,217,255,.30);border-radius:15px;
  background:#061018;padding:8px 7px;text-align:center;box-shadow:inset 0 0 18px rgba(82,217,255,.10);
}
.livebox b{display:block;color:var(--green);font-size:20px;line-height:1;text-shadow:0 0 10px rgba(66,242,138,.55)}
.livebox span{display:block;color:var(--muted);font-size:9px;font-weight:1000;letter-spacing:.12em;margin-top:4px}

.transport{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:12px}
.tr{
  border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:10px 3px;
  color:var(--cream);font-weight:1000;font-size:11px;
  background:linear-gradient(180deg,#344454,#14202d);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 6px 14px rgba(0,0,0,.25);
}
.rec{background:linear-gradient(180deg,#ff4c66,#7b1725)!important}
.play{background:linear-gradient(180deg,#45f58b,#11602d)!important;color:#031108!important}
.blue{background:linear-gradient(180deg,#52d9ff,#165e8d)!important}
.stop{background:linear-gradient(180deg,#ffd36a,#6b4b12)!important;color:#171006!important}

.searchline{display:grid;grid-template-columns:1fr 54px;gap:8px;margin-top:10px}
#q{
  border:1px solid rgba(82,217,255,.35);border-radius:16px;padding:14px;
  font-size:16px;font-weight:850;color:#061018;background:#e9fbff;outline:0;
}
.scan{
  border:1px solid rgba(82,217,255,.35);border-radius:16px;
  background:linear-gradient(180deg,#52d9ff,#0c5d89);color:white;font-weight:1000;font-size:20px;
}
.tabs,.chips,.tools{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.tabs{padding:0 0 3px;margin:10px 0}
.chips,.tools{padding:0 0 8px}
.tabs::-webkit-scrollbar,.chips::-webkit-scrollbar,.tools::-webkit-scrollbar{display:none}
.tab,.chip,.toolbtn{
  white-space:nowrap;border:1px solid var(--line);border-radius:14px;padding:10px 10px;
  color:var(--muted);background:linear-gradient(180deg,#1d2a37,#101923);
  font-size:11px;font-weight:1000;
}
.tab.on,.chip.on,.toolbtn.on{
  color:#061018;background:linear-gradient(180deg,#e9fbff,#52d9ff);
  box-shadow:0 0 18px rgba(82,217,255,.26);
}
select{
  border:1px solid rgba(82,217,255,.30);border-radius:14px;background:#e9fbff;color:#061018;
  padding:10px 12px;font-size:13px;font-weight:850;
}
.boardTitle{
  display:flex;justify-content:space-between;align-items:center;color:var(--muted);
  font-size:11px;font-weight:1000;letter-spacing:.12em;text-transform:uppercase;margin:10px 3px 8px;
}
.boardTitle strong{color:var(--cyan);text-shadow:0 0 10px rgba(82,217,255,.35)}
.scene{display:none}.scene.on{display:block}
.grid,.list,.homeGrid{display:grid;gap:12px}
.panel,.rack,.fruitCard,.lessonCard,.bizCard,.areaCard{padding:12px}
.panel h2,.rack h2,.fruitCard h2,.lessonCard h2,.bizCard h2,.areaCard h2{
  margin:0 0 10px;color:var(--cyan);font-size:14px;letter-spacing:.08em;text-transform:uppercase;
}
.bigLoaded{
  border:1px solid rgba(66,242,138,.26);border-radius:18px;background:#061018;padding:12px;
  box-shadow:inset 0 0 22px rgba(66,242,138,.08);
}
.bigLoaded .name{font-size:21px;font-weight:1000;color:var(--green);text-shadow:0 0 12px rgba(66,242,138,.34)}
.bigLoaded .meta{font-size:12px;color:#d8e5ee;margin-top:5px;line-height:1.35}
.quickStats{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:10px}
.quickStat{border:1px solid rgba(82,217,255,.18);background:#071018;border-radius:14px;padding:8px 4px;text-align:center}
.quickStat b{display:block;font-size:9px;color:var(--muted)}
.quickStat span{display:block;font-size:16px;font-weight:1000;color:var(--green);text-shadow:0 0 8px rgba(66,242,138,.35)}

.cardTop{
  padding:12px;background:radial-gradient(circle at 100% 0%,rgba(82,217,255,.12),transparent 35%),linear-gradient(180deg,#263747,#16232f);
  border-bottom:1px solid rgba(246,236,210,.12);
}
.cardRow{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.country{color:var(--amber);font-size:12px;font-weight:1000}
.zone{margin-top:3px;font-size:20px;font-weight:1000;line-height:1.05}
.style{margin-top:7px;color:var(--cyan);font-size:13px;font-weight:950}
.desc{margin-top:8px;color:#cfdae4;font-size:13px;line-height:1.38}
.star{
  border:1px solid rgba(255,196,79,.38);border-radius:13px;color:var(--amber);
  background:#0a1119;padding:8px 10px;font-size:19px;
}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.pill{
  border:1px solid rgba(82,217,255,.28);background:rgba(82,217,255,.08);color:#dffbff;
  border-radius:999px;padding:6px 8px;font-size:10px;font-weight:950;
}
.lcd{
  margin:12px;border:1px solid rgba(82,217,255,.28);border-radius:18px;padding:11px;
  background:linear-gradient(180deg,#071a25,#031016);
  box-shadow:inset 0 0 20px rgba(82,217,255,.10),0 0 14px rgba(82,217,255,.08);
}
.lcdTitle{
  color:var(--green);font-size:11px;font-weight:1000;letter-spacing:.12em;text-transform:uppercase;
  text-shadow:0 0 10px rgba(66,242,138,.45);
}
.lcdText{margin-top:6px;color:#dffbff;font-size:13px;line-height:1.35}
.digitalGrid,.meterGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:0 12px 12px}
.digital{background:#071018;border:1px solid rgba(82,217,255,.19);border-radius:14px;padding:8px 5px;text-align:center}
.digital b{display:block;color:var(--muted);font-size:9px;font-weight:1000;letter-spacing:.08em}
.digital span{display:block;color:var(--green);font-size:17px;font-weight:1000;margin-top:3px;text-shadow:0 0 10px rgba(66,242,138,.38)}
.digital small{display:block;color:#d6e7f4;font-size:10px;font-weight:900;margin-top:2px}
.meter{background:#090d12;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:7px 5px}
.meter b{display:block;text-align:center;color:#aab8c6;font-size:9px;font-weight:1000;margin-bottom:6px}
.bar{height:50px;border-radius:10px;background:linear-gradient(180deg,#1e2832,#080b0e);border:1px solid rgba(255,255,255,.08);overflow:hidden;position:relative}
.fill{position:absolute;left:0;right:0;bottom:0;box-shadow:0 0 14px rgba(82,217,255,.35)}
.acid{background:linear-gradient(180deg,#42f28a,#158a43)}
.tan{background:linear-gradient(180deg,#ffc44f,#b46a12)}
.sweet{background:linear-gradient(180deg,#b58cff,#6a38cb)}
.bolla{background:linear-gradient(180deg,#52d9ff,#176aa0)}
.bodyf{background:linear-gradient(180deg,#ff8d3d,#bb4315)}
.meter span{display:block;margin-top:5px;text-align:center;color:#eaf8ff;font-size:10px;font-weight:1000}
details{border-top:1px solid rgba(246,236,210,.12)}
summary{
  list-style:none;padding:13px 12px;font-size:13px;font-weight:1000;color:#f9f2df;cursor:pointer;
  background:linear-gradient(180deg,#1c2c3a,#12202d);
}
summary::-webkit-details-marker{display:none}
.sheet{padding:0 12px 13px;color:#cbd7e0;font-size:14px;line-height:1.45}
.sheet h3{margin:14px 0 5px;color:var(--cyan);font-size:11px;letter-spacing:.11em;text-transform:uppercase}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.action{
  display:block;text-align:center;text-decoration:none;border-radius:14px;padding:12px 8px;font-size:12px;font-weight:1000;
  color:#061018;background:linear-gradient(180deg,#e9fbff,#52d9ff);
}
.action.dark{color:var(--cream);background:linear-gradient(180deg,#253746,#121c27);border:1px solid rgba(82,217,255,.25)}
.infoLine{
  display:grid;grid-template-columns:112px 1fr;gap:8px;padding:8px 0;
  border-top:1px solid rgba(246,236,210,.10);font-size:13px;line-height:1.35;
}
.infoLine b{color:var(--amber);font-size:11px;letter-spacing:.06em;text-transform:uppercase}
.infoLine span{color:#d8e5ee}
.mapBox{
  margin-top:10px;border:1px solid rgba(82,217,255,.22);border-radius:18px;padding:12px;
  background:
    radial-gradient(circle at 50% 50%,rgba(82,217,255,.18),transparent 22%),
    linear-gradient(135deg,rgba(82,217,255,.08),rgba(255,196,79,.06)),
    #071018;
}
.mapBox b{display:block;color:var(--green);font-size:12px;letter-spacing:.1em}
.mapBox span{display:block;color:#d8e5ee;font-size:13px;margin-top:5px}

.fruitImg{
  height:138px;border-radius:18px;border:1px solid rgba(82,217,255,.22);
  background:
    radial-gradient(circle at 35% 38%,rgba(255,255,255,.35),transparent 8%),
    radial-gradient(circle at 50% 50%,var(--fruit1),var(--fruit2) 46%,transparent 47%),
    radial-gradient(circle at 63% 52%,var(--fruit1),var(--fruit2) 46%,transparent 47%),
    linear-gradient(180deg,#071018,#111c28);
  position:relative;overflow:hidden;margin-bottom:10px;
}
.fruitImg:before{
  content:"";position:absolute;width:36px;height:18px;border-radius:100% 0 100% 0;background:#4ee08a;
  left:50%;top:20px;transform:rotate(-28deg);box-shadow:0 0 14px rgba(66,242,138,.35);
}
.fruitImg:after{
  content:"";position:absolute;width:9px;height:30px;border-radius:9px;background:#6b3b18;left:49%;top:21px;transform:rotate(12deg);
}
.appleRed{--fruit1:#ff5969;--fruit2:#8d1427}
.appleGreen{--fruit1:#95ff70;--fruit2:#267a2a}
.appleGold{--fruit1:#ffd76a;--fruit2:#b66b16}
.appleDark{--fruit1:#7c2f18;--fruit2:#38160e}
.pear{--fruit1:#d7ff7a;--fruit2:#7d8f2b}
.crab{--fruit1:#ff4055;--fruit2:#5c1120}

.lessonNum{color:var(--green);font-size:12px;font-weight:1000;letter-spacing:.12em}
.quizBox{margin-top:10px;border:1px solid rgba(255,196,79,.25);border-radius:18px;padding:10px;background:#071018}
.quizBox button{
  width:100%;margin-top:7px;border:1px solid rgba(82,217,255,.22);border-radius:13px;padding:10px;
  background:linear-gradient(180deg,#24364a,#111b26);color:#e8f8ff;font-weight:900;text-align:left;
}
.quizAnswer{display:none;margin-top:8px;color:var(--green);font-size:13px;line-height:1.35}
.bizScore{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px;
}
.bizScore div{background:#071018;border:1px solid rgba(82,217,255,.17);border-radius:12px;padding:7px 3px;text-align:center}
.bizScore b{display:block;color:var(--muted);font-size:8px}
.bizScore span{display:block;color:var(--green);font-size:15px;font-weight:1000}
.mixerDeck{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 12px;scrollbar-width:none}
.mixerDeck::-webkit-scrollbar{display:none}
.channel{
  min-width:164px;border:1px solid rgba(82,217,255,.22);border-radius:22px;background:linear-gradient(180deg,#263747,#111b26);
  box-shadow:var(--shadow);padding:10px;
}
.chName{color:var(--amber);font-size:12px;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chType{color:#d7e8f2;font-size:11px;margin-top:4px;line-height:1.28;min-height:30px}
.vu{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin:10px 0}
.vu i{height:10px;border-radius:3px;background:#18232e}
.vu i.g{background:var(--green);box-shadow:0 0 8px rgba(66,242,138,.58)}
.vu i.y{background:var(--amber);box-shadow:0 0 8px rgba(255,196,79,.48)}
.vu i.r{background:var(--red);box-shadow:0 0 8px rgba(255,59,85,.48)}
.faderSet{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.fader{height:126px;background:#081018;border:1px solid rgba(255,255,255,.08);border-radius:13px;position:relative;padding-top:5px}
.fader label{display:block;text-align:center;font-size:8px;color:var(--muted);font-weight:1000}
.track{position:absolute;left:50%;top:24px;bottom:12px;width:5px;transform:translateX(-50%);border-radius:99px;background:#2a3642}
.knob{
  position:absolute;left:50%;width:28px;height:16px;border-radius:7px;transform:translateX(-50%);
  background:linear-gradient(180deg,#f9edcf,#8f9cad);box-shadow:0 4px 8px rgba(0,0,0,.55);
}
.compareGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.compareMini{border:1px solid rgba(82,217,255,.20);border-radius:18px;padding:10px;background:#081018}
.compareMini h3{margin:0;color:var(--amber);font-size:13px}
.crow{display:grid;grid-template-columns:76px 1fr;gap:6px;border-top:1px solid rgba(246,236,210,.10);padding:7px 0;font-size:12px}
.crow b{color:var(--cyan)}
.empty{display:none;border:1px dashed rgba(82,217,255,.30);border-radius:20px;padding:24px;text-align:center;color:var(--muted)}
.bottomNav{
  position:fixed;left:10px;right:10px;bottom:10px;max-width:980px;margin:auto;
  display:grid;grid-template-columns:repeat(5,1fr);gap:7px;padding:8px;
  border:1px solid rgba(82,217,255,.25);border-radius:22px;background:rgba(7,16,26,.88);
  backdrop-filter:blur(14px);box-shadow:var(--shadow);z-index:60;
}
.bottomNav button{
  border:1px solid rgba(246,236,210,.14);border-radius:14px;padding:10px 3px;
  color:#e8f8ff;font-size:10px;font-weight:1000;background:linear-gradient(180deg,#233546,#101b26);
}
.compact .lcd,.compact .meterGrid,.compact details{display:none}
@media(min-width:760px){
  .grid,.list,.homeGrid{grid-template-columns:1fr 1fr}
}
</style>
</head>

<body>
<div class="app" id="app">

  <div class="topbar">
    <div class="master">
      <div class="brand">
        <div style="display:flex;gap:11px;align-items:center">
          <div class="logo">XA</div>
          <div>
            <h1>Cider Atlas Pro V7</h1>
            <div class="sub">Atlante · scuola · business · mele · ricette XA</div>
          </div>
        </div>
        <div class="livebox"><b id="liveCount">00</b><span>STYLE</span></div>
      </div>

      <div class="transport">
        <button class="tr rec" onclick="quick('Asturie')">● REC</button>
        <button class="tr play" onclick="loadTop()">▶ LOAD</button>
        <button class="tr blue" onclick="scene('mele')">MELE</button>
        <button class="tr" onclick="copyFiltered()">COPY</button>
        <button class="tr stop" onclick="clearQ()">STOP</button>
      </div>

      <div class="searchline">
        <input id="q" type="search" placeholder="Cerca: Estonia, Lituania, Russia, Bulgaria, Alpi, perry...">
        <button class="scan" onclick="render()">⌕</button>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button id="t_home" class="tab on" onclick="scene('home')">HOME</button>
    <button id="t_atlas" class="tab" onclick="scene('atlas')">ATLAS</button>
    <button id="t_aree" class="tab" onclick="scene('aree')">AREE</button>
    <button id="t_paesi" class="tab" onclick="scene('paesi')">PAESI</button>
    <button id="t_stili" class="tab" onclick="scene('stili')">STILI</button>
    <button id="t_mele" class="tab" onclick="scene('mele')">MELE</button>
    <button id="t_school" class="tab" onclick="scene('school')">SCHOOL</button>
    <button id="t_business" class="tab" onclick="scene('business')">BUSINESS</button>
    <button id="t_mixer" class="tab" onclick="scene('mixer')">MIXER</button>
    <button id="t_compare" class="tab" onclick="scene('compare')">CONFR.</button>
    <button id="t_fav" class="tab" onclick="scene('fav')">FAV</button>
  </div>

  <div class="tools">
    <select id="sorter" onchange="render()">
      <option value="xa">Ordina: interesse XA</option>
      <option value="business">Ordina: business</option>
      <option value="acid">Ordina: acidità</option>
      <option value="tan">Ordina: tannino</option>
      <option value="sweet">Ordina: dolcezza</option>
      <option value="bolla">Ordina: bolla</option>
      <option value="az">Ordina: A-Z</option>
    </select>
    <button class="toolbtn" id="compactBtn" onclick="toggleCompact()">Compatto</button>
    <button class="toolbtn" onclick="copyFiltered()">Copia filtro</button>
  </div>

  <div class="chips" id="chips"></div>

  <div class="boardTitle">
    <span id="sceneTitle">Master Control</span>
    <strong id="countText">0 schede</strong>
  </div>

  <section id="home" class="scene on">
    <div class="homeGrid">
      <div class="panel">
        <h2>Style Loaded</h2>
        <div id="loadedBox" class="bigLoaded"></div>
      </div>
      <div class="panel">
        <h2>Top XA Styles</h2>
        <div id="topDeck"></div>
      </div>
      <div class="panel">
        <h2>Filtro attivo</h2>
        <div id="filterInfo"></div>
      </div>
      <div class="panel">
        <h2>Azioni rapide</h2>
        <div class="actions">
          <a class="action" href="javascript:scene('atlas')">APRI ATLAS</a>
          <a class="action dark" href="javascript:scene('business')">BUSINESS</a>
          <a class="action" href="javascript:scene('school')">XA SCHOOL</a>
          <a class="action dark" href="javascript:copyLoadedRecipe()">COPIA LOADED</a>
        </div>
      </div>
    </div>
  </section>

  <section id="atlas" class="scene"><div id="cards" class="grid"></div><div id="empty" class="empty">Nessun risultato.</div></section>
  <section id="aree" class="scene"><div id="areeDeck" class="list"></div></section>
  <section id="paesi" class="scene"><div id="paesiDeck" class="list"></div></section>
  <section id="stili" class="scene"><div id="stiliDeck" class="list"></div></section>
  <section id="mele" class="scene"><div id="meleDeck" class="list"></div></section>
  <section id="school" class="scene"><div id="schoolDeck" class="list"></div></section>
  <section id="business" class="scene"><div id="businessDeck" class="list"></div></section>
  <section id="mixer" class="scene"><div id="mixerDeck" class="mixerDeck"></div></section>

  <section id="compare" class="scene">
    <div class="panel">
      <h2>Confronta due stili</h2>
      <select id="cmpA" onchange="renderCompare()"></select>
      <select id="cmpB" onchange="renderCompare()"></select>
      <div id="compareResult"></div>
    </div>
  </section>

  <section id="fav" class="scene">
    <div id="favDeck" class="grid"></div>
    <div id="favEmpty" class="empty" style="display:block">Nessun preferito salvato.</div>
  </section>

</div>

<div class="bottomNav">
  <button onclick="scene('home')">HOME</button>
  <button onclick="quick('Baltici')">BALTICI</button>
  <button onclick="quick('Alpi')">ALPI</button>
  <button onclick="quick('Perry')">PERRY</button>
  <button onclick="scene('business')">BIZ</button>
</div>

function norm(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
function txt(x){return norm([x.area,x.p,x.z,x.st,x.f,x.d,x.w,x.m,x.fr,x.pr,x.lk,x.ab,...x.tags].join(" "))}
function lvl(v){return v<25?"LOW":v<55?"MID":v<80?"HIGH":"MAX"}
function fill(v,cls){return `<div class="bar"><div class="fill ${cls}" style="height:${v}%"></div></div>`}
function bizTotal(x){return Math.round((x.hist+x.biz+x.orig+x.import+x.xa)/5)}
function chipMatch(x,c){
  const h=txt(x), k=norm(c);
  if(k==="classici")return x.area==="CLASSICI";
  if(k==="alpini")return x.area==="ALPINI";
  if(k==="nordici")return h.includes("nord");
  if(k==="baltici")return h.includes("baltici")||h.includes("estonia")||h.includes("lettonia")||h.includes("lituania");
  if(k==="europa est")return x.area==="EUROPA EST";
  if(k==="balcani")return x.area==="BALCANI";
  if(k==="nuovo mondo")return x.area==="NUOVO MONDO";
  if(k==="business")return bizTotal(x)>=80;
  if(k==="naturali")return h.includes("natural")||h.includes("naturale")||h.includes("pet-nat");
  if(k==="tannici")return x.t>=65;
  if(k==="dolci")return x.s>=55;
  if(k==="secchi")return x.s<=25;
  return h.includes(k);
}
function sorted(arr){
  const mode=document.getElementById("sorter")?.value || "xa";
  const a=[...arr];
  if(mode==="xa")a.sort((x,y)=>y.xa-x.xa);
  if(mode==="business")a.sort((x,y)=>bizTotal(y)-bizTotal(x));
  if(mode==="acid")a.sort((x,y)=>y.a-x.a);
  if(mode==="tan")a.sort((x,y)=>y.t-x.t);
  if(mode==="sweet")a.sort((x,y)=>y.s-x.s);
  if(mode==="bolla")a.sort((x,y)=>y.b-x.b);
  if(mode==="az")a.sort((x,y)=>x.z.localeCompare(y.z));
  return a;
}
function results(){
  const term=norm(q.value.trim());
  return sorted(DATA.filter(x=>(!term||txt(x).includes(term))&&(!activeChip||chipMatch(x,activeChip))));
}

function clearQ(){q.value="";activeChip="";render()}
function toggleCompact(){compact=!compact;document.getElementById("app").classList.toggle("compact",compact);document.getElementById("compactBtn").classList.toggle("on",compact)}
function toggleFav(id){favs.has(id)?favs.delete(id):favs.add(id);localStorage.setItem("xa_cider_atlas_v7_favs",JSON.stringify([...favs]));render()}
function loadStyle(id){loadedId=id;localStorage.setItem("xa_cider_atlas_v7_loaded",id);document.getElementById("cmpA").value=id;scene("home")}
function loadTop(){const top=results()[0]||DATA[0];loadStyle(top.id)}
function showQuiz(i){document.getElementById("quiz"+i).style.display="block"}
function copiaScheda(id){
  const x=byId(id);
  const text=`${x.z} - ${x.p}
Area: ${x.area}
Stile: ${x.st}
Famiglia: ${x.f}
Dove: ${x.w}
Metodo: ${x.m}
Mele/pere/frutta: ${x.fr}
Profilo: ${x.pr}
Cosa cercare: ${x.lk}
ABV: ${x.ab}
Acidità: ${x.a}
Tannino: ${x.t}
Dolcezza: ${x.s}
Bolla: ${x.b}
Corpo: ${x.c}
Interesse XA: ${x.xa}/100
Business: ${bizTotal(x)}/100`;
  if(navigator.clipboard)navigator.clipboard.writeText(text);
  alert("Scheda copiata.");
}
function ricettaText(x){
  return `RICETTA XA ISPIRATA A: ${x.z}

Paese / area:
${x.p} — ${x.area}

Stile guida:
${x.st}

Base frutta:
${x.fr}

Target tecnico:
- Acidità: ${x.a}/100
- Tannino: ${x.t}/100
- Dolcezza: ${x.s}/100
- Bolla: ${x.b}/100
- Corpo: ${x.c}/100
- ABV indicativo: ${x.ab}

Metodo di riferimento:
${x.m}

Profilo desiderato:
${x.pr}

Parole chiave ricerca:
${x.lk}

Uso XA:
Interesse XA ${x.xa}/100. Business ${bizTotal(x)}/100.
Usare come base per scheda ricetta, scuola, lotto sperimentale e valutazione import.`;
}
function copiaRicetta(id){if(navigator.clipboard)navigator.clipboard.writeText(ricettaText(byId(id)));alert("Ricetta XA copiata.")}
function copyLoadedRecipe(){copiaRicetta(loadedId)}
function copyFiltered(){
  const text=results().map(x=>`${x.z} | ${x.p} | ${x.st} | XA ${x.xa}/100 | BIZ ${bizTotal(x)}/100 | ${x.lk}`).join("\n");
  if(navigator.clipboard)navigator.clipboard.writeText(text);
  alert("Filtro copiato.");
}

q.addEventListener("input",render);
renderOptions();
renderChips();
render();
